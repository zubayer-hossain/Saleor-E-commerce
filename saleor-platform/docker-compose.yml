services:
  api:
    image: ghcr.io/saleor/saleor:3.23
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=http://localhost:9000/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,host.docker.internal
      # Allow GraphQL introspection from Docker services (e.g. storefront codegen)
      - HTTP_IP_FILTER_ENABLED=False

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.23
    ports:
      - 9000:80
    restart: unless-stopped

  db:
    image: library/postgres:15-alpine
    ports:
      # Host 5433 avoids conflict with local PostgreSQL (e.g. Laragon on 5432)
      - 5433:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:8.1-alpine
    ports:
      # Host 6380 avoids conflict with local Redis on 6379
      - 6380:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    image: ghcr.io/saleor/saleor:3.23
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    # Async webhooks (e.g. INVOICE_REQUESTED) POST from Celery. common.env sets
    # HTTP_IP_FILTER_ENABLED=True — Saleor then rejects Docker-internal URLs like
    # http://storefront:3000 as non-public IPs ("Invalid IP address"). Match api.
    environment:
      - HTTP_IP_FILTER_ENABLED=False
    depends_on:
      - cache
      - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  mailpit:
    image: axllent/mailpit
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui. Visit http://localhost:8025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

  # Official Saleor Storefront (Next.js). Runs in Linux to avoid Windows native build issues (node-gyp).
  storefront:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      # App source from the host — keep codegen output and edits in git.
      - ../saleor-storefront:/app
      # Linux-only node_modules — never bind-mount host `node_modules` from Windows/Mac (pnpm symlink
      # layouts break inside the container: missing next loaders, MODULE_NOT_FOUND for @swc/helpers, 500s).
      - storefront-node-modules:/app/node_modules
    env_file:
      - ../saleor-storefront/.env
    networks:
      - saleor-backend-tier
    environment:
      # Browser runs on the host — must use a URL the host can reach (Saleor published on localhost:8000).
      NEXT_PUBLIC_SALEOR_API_URL: http://127.0.0.1:8000/graphql/
      # Next.js server + GraphQL codegen run in this container — use the Compose service name.
      SALEOR_API_SERVER_URL: http://api:8000/graphql/
      NEXT_PUBLIC_STOREFRONT_URL: http://localhost:3000
      # Saleor API + Celery worker POST webhooks from inside Docker — must use the Compose
      # service hostname. `localhost` here would hit the wrong container.
      SALEOR_WEBHOOK_TARGET_ORIGIN: http://storefront:3000
      # NEXT_PUBLIC_DEFAULT_CHANNEL comes from saleor-storefront/.env (do not hardcode here)
      # Reliable file watching when bind-mounting from Windows/macOS
      WATCHPACK_POLLING: "true"
      # Faster local Docker dev — default client enforces ~200ms between each GraphQL (feels stalled on /
      # → /shop with many SSR queries). Omit in production-looking compose if you tune rate limits.
      SALEOR_MIN_REQUEST_DELAY_MS: "0"
      SALEOR_MAX_CONCURRENT_REQUESTS: "8"
      # Stripe direct integration — values come from saleor-storefront/.env so secrets stay out of compose.
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, SALEOR_APP_TOKEN_PAYMENTS
      # must all be set in that .env. They are inherited via the `env_file` directive above.
    depends_on:
      - api
    # Use `next dev` directly so lifecycle `predev` does not re-run GraphQL codegen on every boot (slow on bind mounts).
    # After changing `src/graphql/**/*.graphql`, run codegen from the repo root:
    #   docker compose run --rm --no-deps storefront sh -lc "corepack enable && corepack prepare pnpm@10.28.1 --activate && cd /app && pnpm install && pnpm run generate:all"
    # (`pnpm run generate:all` uses SALEOR_API_SERVER_URL so introspection reaches `api`.)
    command: >
      sh -c "corepack enable && corepack prepare pnpm@10.28.1 --activate &&
      if [ ! -f node_modules/next/package.json ]; then pnpm install; fi &&
      pnpm exec next dev --webpack --hostname 0.0.0.0 --port 3000"

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  storefront-node-modules:
    driver: local
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge
